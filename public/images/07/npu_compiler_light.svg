<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="800" viewBox="0 0 1300 800"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">

  <defs>
    <!-- Inception module template (origin at 0,0) -->
    <g id="inception-light">
      <rect x="0"  y="98"  width="8" height="20" fill="#378ADD"/>
      <rect x="15" y="80"  width="8" height="14" fill="#378ADD"/>
      <rect x="15" y="98"  width="8" height="14" fill="#378ADD"/>
      <rect x="15" y="116" width="8" height="14" fill="#5DCAA5"/>
      <rect x="30" y="65"  width="8" height="14" fill="#EF9F27"/>
      <rect x="30" y="83"  width="8" height="14" fill="#378ADD"/>
      <rect x="30" y="101" width="8" height="14" fill="#5DCAA5"/>
      <rect x="45" y="98"  width="8" height="14" fill="#EF9F27"/>
      <rect x="45" y="116" width="8" height="14" fill="#378ADD"/>
      <rect x="60" y="80"  width="8" height="48" fill="#FAC775"/>
    </g>
  </defs>

  <!-- ============================================== -->
  <!-- TOP: Model as a Graph -->
  <!-- ============================================== -->
  <text x="320" y="80"  font-size="24" fill="#5F5E5A" text-anchor="middle">Model</text>
  <text x="320" y="112" font-size="24" fill="#5F5E5A" text-anchor="middle">as a Graph</text>

  <!-- NN Graph viz: input + conv chain + 5 inceptions + tail + output -->
  <g>
    <!-- Input -->
    <rect x="540" y="98" width="8" height="20" fill="#85B7EB"/>
    <line x1="548" y1="108" x2="565" y2="108" stroke="#888780" stroke-width="0.6"/>

    <!-- Conv chain -->
    <rect x="565" y="92"  width="8" height="14" fill="#378ADD"/>
    <rect x="565" y="110" width="8" height="14" fill="#378ADD"/>
    <line x1="573" y1="108" x2="585" y2="108" stroke="#888780" stroke-width="0.6"/>
    <rect x="585" y="92"  width="8" height="14" fill="#5DCAA5"/>
    <rect x="585" y="110" width="8" height="14" fill="#5DCAA5"/>
    <line x1="593" y1="108" x2="605" y2="108" stroke="#888780" stroke-width="0.6"/>
    <rect x="605" y="92"  width="8" height="14" fill="#378ADD"/>
    <rect x="605" y="110" width="8" height="14" fill="#378ADD"/>

    <!-- 5 Inception modules at x = 625, 705, 785, 865, 945 -->
    <line x1="613" y1="108" x2="625" y2="105" stroke="#888780" stroke-width="0.6"/>
    <use href="#inception-light" x="625"/>
    <line x1="693" y1="105" x2="705" y2="105" stroke="#888780" stroke-width="0.6"/>
    <use href="#inception-light" x="705"/>
    <line x1="773" y1="105" x2="785" y2="105" stroke="#888780" stroke-width="0.6"/>
    <use href="#inception-light" x="785"/>
    <line x1="853" y1="105" x2="865" y2="105" stroke="#888780" stroke-width="0.6"/>
    <use href="#inception-light" x="865"/>
    <line x1="933" y1="105" x2="945" y2="105" stroke="#888780" stroke-width="0.6"/>
    <use href="#inception-light" x="945"/>

    <!-- Tail: avg pool, FC, softmax -->
    <line x1="1013" y1="105" x2="1030" y2="105" stroke="#888780" stroke-width="0.6"/>
    <rect x="1030" y="95" width="8" height="20" fill="#5DCAA5"/>
    <line x1="1038" y1="105" x2="1055" y2="105" stroke="#888780" stroke-width="0.6"/>
    <rect x="1055" y="90" width="8" height="30" fill="#FAC775"/>
    <line x1="1063" y1="105" x2="1080" y2="105" stroke="#888780" stroke-width="0.6"/>
    <rect x="1080" y="98" width="8" height="14" fill="#EF9F27"/>
    <rect x="1080" y="115" width="8" height="14" fill="#378ADD"/>
    <line x1="1088" y1="111" x2="1105" y2="111" stroke="#888780" stroke-width="0.6"/>
    <rect x="1105" y="95" width="8" height="20" fill="#FAC775"/>
    <line x1="1113" y1="105" x2="1135" y2="105" stroke="#888780" stroke-width="0.6"/>

    <!-- Output -->
    <rect x="1135" y="95" width="8" height="20" fill="#FAC775"/>
  </g>

  <!-- Down arrow #1: Model → Compiler -->
  <path d="M 685 200 L 755 200 L 755 250 L 790 250 L 720 290 L 650 250 L 685 250 Z"
        fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>

  <!-- ============================================== -->
  <!-- MIDDLE: Architecture Details + NPU Compiler -->
  <!-- ============================================== -->
  <text x="170" y="283" font-size="24" fill="#5F5E5A" text-anchor="middle">Architecture</text>
  <text x="170" y="315" font-size="24" fill="#5F5E5A" text-anchor="middle">Details</text>

  <!-- Arch viz outer container -->
  <rect x="30" y="345" width="290" height="173" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>

  <!-- Compute Units -->
  <rect x="42" y="357" width="158" height="133" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
  <text x="121" y="372" font-size="11" fill="#2C2C2A" text-anchor="middle" font-weight="600">Compute Units</text>
  <g font-size="9.5" fill="#085041" text-anchor="middle">
    <rect x="50" y="378" width="142" height="25" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="121" y="394">Tensor Processor</text>
    <rect x="50" y="406" width="142" height="25" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="121" y="422">Vector Processor</text>
    <rect x="50" y="434" width="142" height="25" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="121" y="450">Register Bank</text>
    <rect x="50" y="462" width="142" height="25" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
    <text x="121" y="478">Load / Store</text>
  </g>

  <!-- Task Manager -->
  <rect x="208" y="357" width="100" height="90" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
  <text x="258" y="372" font-size="11" fill="#2C2C2A" text-anchor="middle" font-weight="600">Task Manager</text>
  <g font-size="9.5" fill="#2C2C2A" text-anchor="middle">
    <rect x="216" y="378" width="84" height="20" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
    <text x="258" y="392">Task Queue</text>
    <rect x="216" y="401" width="84" height="20" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
    <text x="258" y="415">Sync Control</text>
    <rect x="216" y="424" width="84" height="20" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
    <text x="258" y="438">Priority Ctrl</text>
  </g>

  <!-- Neural DMA -->
  <rect x="208" y="453" width="100" height="37" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
  <text x="258" y="466" font-size="10.5" fill="#2C2C2A" text-anchor="middle" font-weight="600">Neural DMA</text>
  <rect x="216" y="470" width="84" height="17" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="258" y="482" font-size="9.5" fill="#633806" text-anchor="middle">DMA Engine</text>

  <!-- L0 SPM bar -->
  <rect x="42" y="496" width="266" height="16" rx="3" fill="#444441"/>
  <text x="175" y="507" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="600">L0 Scratch Pad Memory (4 MB)</text>

  <!-- Right arrow Arch → Compiler -->
  <path d="M 330 335 L 410 335 L 410 320 L 450 350 L 410 380 L 410 365 L 330 365 Z"
        fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>

  <!-- NPU Compiler -->
  <rect x="460" y="300" width="520" height="100" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="720" y="358" font-size="26" fill="#2C2C2A" text-anchor="middle" font-weight="500">NPU Compiler</text>

  <!-- Down arrow #2: Compiler → Queues -->
  <path d="M 685 420 L 755 420 L 755 470 L 790 470 L 720 510 L 650 470 L 685 470 Z"
        fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>

  <!-- ============================================== -->
  <!-- BOTTOM: 9 Instruction Queues -->
  <!-- ============================================== -->
  <g stroke="#5F5E5A" stroke-width="1.5" fill="none">
    <rect x="25"   y="540" width="130" height="245" rx="3"/>
    <rect x="165"  y="540" width="130" height="245" rx="3"/>
    <rect x="305"  y="540" width="130" height="245" rx="3"/>
    <rect x="445"  y="540" width="130" height="245" rx="3"/>
    <rect x="585"  y="540" width="130" height="245" rx="3"/>
    <rect x="725"  y="540" width="130" height="245" rx="3"/>
    <rect x="865"  y="540" width="130" height="245" rx="3"/>
    <rect x="1005" y="540" width="130" height="245" rx="3"/>
    <rect x="1145" y="540" width="130" height="245" rx="3"/>
  </g>

  <!-- Internal dividers: 6 per box at y = 575, 610, 645, 680, 715, 750 -->
  <g stroke="#888780" stroke-width="0.8">
    <line x1="25"   y1="575" x2="155"  y2="575"/><line x1="25"   y1="610" x2="155"  y2="610"/><line x1="25"   y1="645" x2="155"  y2="645"/><line x1="25"   y1="680" x2="155"  y2="680"/><line x1="25"   y1="715" x2="155"  y2="715"/><line x1="25"   y1="750" x2="155"  y2="750"/>
    <line x1="165"  y1="575" x2="295"  y2="575"/><line x1="165"  y1="610" x2="295"  y2="610"/><line x1="165"  y1="645" x2="295"  y2="645"/><line x1="165"  y1="680" x2="295"  y2="680"/><line x1="165"  y1="715" x2="295"  y2="715"/><line x1="165"  y1="750" x2="295"  y2="750"/>
    <line x1="305"  y1="575" x2="435"  y2="575"/><line x1="305"  y1="610" x2="435"  y2="610"/><line x1="305"  y1="645" x2="435"  y2="645"/><line x1="305"  y1="680" x2="435"  y2="680"/><line x1="305"  y1="715" x2="435"  y2="715"/><line x1="305"  y1="750" x2="435"  y2="750"/>
    <line x1="445"  y1="575" x2="575"  y2="575"/><line x1="445"  y1="610" x2="575"  y2="610"/><line x1="445"  y1="645" x2="575"  y2="645"/><line x1="445"  y1="680" x2="575"  y2="680"/><line x1="445"  y1="715" x2="575"  y2="715"/><line x1="445"  y1="750" x2="575"  y2="750"/>
    <line x1="585"  y1="575" x2="715"  y2="575"/><line x1="585"  y1="610" x2="715"  y2="610"/><line x1="585"  y1="645" x2="715"  y2="645"/><line x1="585"  y1="680" x2="715"  y2="680"/><line x1="585"  y1="715" x2="715"  y2="715"/><line x1="585"  y1="750" x2="715"  y2="750"/>
    <line x1="725"  y1="575" x2="855"  y2="575"/><line x1="725"  y1="610" x2="855"  y2="610"/><line x1="725"  y1="645" x2="855"  y2="645"/><line x1="725"  y1="680" x2="855"  y2="680"/><line x1="725"  y1="715" x2="855"  y2="715"/><line x1="725"  y1="750" x2="855"  y2="750"/>
    <line x1="865"  y1="575" x2="995"  y2="575"/><line x1="865"  y1="610" x2="995"  y2="610"/><line x1="865"  y1="645" x2="995"  y2="645"/><line x1="865"  y1="680" x2="995"  y2="680"/><line x1="865"  y1="715" x2="995"  y2="715"/><line x1="865"  y1="750" x2="995"  y2="750"/>
    <line x1="1005" y1="575" x2="1135" y2="575"/><line x1="1005" y1="610" x2="1135" y2="610"/><line x1="1005" y1="645" x2="1135" y2="645"/><line x1="1005" y1="680" x2="1135" y2="680"/><line x1="1005" y1="715" x2="1135" y2="715"/><line x1="1005" y1="750" x2="1135" y2="750"/>
    <line x1="1145" y1="575" x2="1275" y2="575"/><line x1="1145" y1="610" x2="1275" y2="610"/><line x1="1145" y1="645" x2="1275" y2="645"/><line x1="1145" y1="680" x2="1275" y2="680"/><line x1="1145" y1="715" x2="1275" y2="715"/><line x1="1145" y1="750" x2="1275" y2="750"/>
  </g>

</svg>
