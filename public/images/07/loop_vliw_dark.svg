<svg xmlns="http://www.w3.org/2000/svg" width="800" height="310" viewBox="0 0 800 310"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">

  <g font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace"
     font-size="14" fill="#D3D1C7" xml:space="preserve">

    <text x="60" y="40">sw      t3, 0(s3)</text>
    <text x="240" y="40">mul     t2, t1, t1</text>
    <text x="420" y="40">slli    s2, s1, 2</text>
    <text x="60" y="60">addi    s1, s1, 1</text>
    <text x="240" y="60">add     t3, t2, t1</text>
    <text x="420" y="60">add     s3, s0, s2</text>

    <text x="60" y="100">sw      t3, 0(s3)</text>
    <text x="240" y="100">mul     t2, t1, t1</text>
    <text x="420" y="100">slli    s2, s1, 2</text>
    <text x="60" y="120">addi    s1, s1, 1</text>
    <text x="240" y="120">add     t3, t2, t1</text>
    <text x="420" y="120">add     s3, s0, s2</text>

    <text x="60" y="160">sw      t3, 0(s3)</text>
    <text x="240" y="160">mul     t2, t1, t1</text>
    <text x="420" y="160">slli    s2, s1, 2</text>
    <text x="60" y="180">addi    s1, s1, 1</text>
    <text x="240" y="180">add     t3, t2, t1</text>
    <text x="420" y="180">add     s3, s0, s2</text>

    <text x="60" y="220">sw      t3, 0(s3)</text>
    <text x="240" y="220">mul     t2, t1, t1</text>
    <text x="420" y="220">slli    s2, s1, 2</text>
    <text x="60" y="240">addi    s1, s1, 1</text>
    <text x="240" y="240">add     t3, t2, t1</text>
    <text x="420" y="240">add     s3, s0, s2</text>
  </g>

  <rect x="50" y="26" width="525" height="40" rx="6" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="6 3"/>

  <g fill="#D3D1C7">
    <circle cx="317" cy="265" r="2"/>
    <circle cx="317" cy="275" r="2"/>
    <circle cx="317" cy="285" r="2"/>
  </g>
</svg>
