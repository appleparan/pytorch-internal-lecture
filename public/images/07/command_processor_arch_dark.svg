<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">

  <!-- Command Stream label -->
  <text x="460" y="28" text-anchor="middle" font-size="16" fill="#B4B2A9">Command Stream</text>

  <!-- Down arrow -->
  <path d="M 445 45 L 475 45 L 475 72 L 495 72 L 460 100 L 425 72 L 445 72 Z"
        fill="#444441" stroke="#888780" stroke-width="1.2"/>

  <!-- Command Processor -->
  <rect x="390" y="115" width="140" height="58" rx="4" fill="#444441" stroke="#B4B2A9" stroke-width="1.5"/>
  <text x="460" y="140" text-anchor="middle" font-size="14" fill="#D3D1C7">Command</text>
  <text x="460" y="159" text-anchor="middle" font-size="14" fill="#D3D1C7">Processor</text>

  <!-- Tree connections -->
  <g stroke="#B4B2A9" stroke-width="1.2" fill="none">
    <line x1="460" y1="173" x2="460" y2="195"/>
    <line x1="60" y1="195" x2="860" y2="195"/>
    <line x1="60" y1="195" x2="60" y2="220"/>
    <line x1="160" y1="195" x2="160" y2="220"/>
    <line x1="260" y1="195" x2="260" y2="220"/>
    <line x1="360" y1="195" x2="360" y2="220"/>
    <line x1="460" y1="195" x2="460" y2="220"/>
    <line x1="560" y1="195" x2="560" y2="220"/>
    <line x1="660" y1="195" x2="660" y2="220"/>
    <line x1="760" y1="195" x2="760" y2="220"/>
    <line x1="860" y1="195" x2="860" y2="220"/>
  </g>

  <!-- Instruction queue boxes (9) -->
  <g stroke="#B4B2A9" stroke-width="1.5" fill="none">
    <rect x="15"  y="220" width="90" height="150" rx="2"/>
    <rect x="115" y="220" width="90" height="150" rx="2"/>
    <rect x="215" y="220" width="90" height="150" rx="2"/>
    <rect x="315" y="220" width="90" height="150" rx="2"/>
    <rect x="415" y="220" width="90" height="150" rx="2"/>
    <rect x="515" y="220" width="90" height="150" rx="2"/>
    <rect x="615" y="220" width="90" height="150" rx="2"/>
    <rect x="715" y="220" width="90" height="150" rx="2"/>
    <rect x="815" y="220" width="90" height="150" rx="2"/>
  </g>

  <!-- Internal divider lines: 5 per box -->
  <g stroke="#888780" stroke-width="0.8">
    <line x1="15"  y1="245" x2="105" y2="245"/><line x1="15"  y1="270" x2="105" y2="270"/><line x1="15"  y1="295" x2="105" y2="295"/><line x1="15"  y1="320" x2="105" y2="320"/><line x1="15"  y1="345" x2="105" y2="345"/>
    <line x1="115" y1="245" x2="205" y2="245"/><line x1="115" y1="270" x2="205" y2="270"/><line x1="115" y1="295" x2="205" y2="295"/><line x1="115" y1="320" x2="205" y2="320"/><line x1="115" y1="345" x2="205" y2="345"/>
    <line x1="215" y1="245" x2="305" y2="245"/><line x1="215" y1="270" x2="305" y2="270"/><line x1="215" y1="295" x2="305" y2="295"/><line x1="215" y1="320" x2="305" y2="320"/><line x1="215" y1="345" x2="305" y2="345"/>
    <line x1="315" y1="245" x2="405" y2="245"/><line x1="315" y1="270" x2="405" y2="270"/><line x1="315" y1="295" x2="405" y2="295"/><line x1="315" y1="320" x2="405" y2="320"/><line x1="315" y1="345" x2="405" y2="345"/>
    <line x1="415" y1="245" x2="505" y2="245"/><line x1="415" y1="270" x2="505" y2="270"/><line x1="415" y1="295" x2="505" y2="295"/><line x1="415" y1="320" x2="505" y2="320"/><line x1="415" y1="345" x2="505" y2="345"/>
    <line x1="515" y1="245" x2="605" y2="245"/><line x1="515" y1="270" x2="605" y2="270"/><line x1="515" y1="295" x2="605" y2="295"/><line x1="515" y1="320" x2="605" y2="320"/><line x1="515" y1="345" x2="605" y2="345"/>
    <line x1="615" y1="245" x2="705" y2="245"/><line x1="615" y1="270" x2="705" y2="270"/><line x1="615" y1="295" x2="705" y2="295"/><line x1="615" y1="320" x2="705" y2="320"/><line x1="615" y1="345" x2="705" y2="345"/>
    <line x1="715" y1="245" x2="805" y2="245"/><line x1="715" y1="270" x2="805" y2="270"/><line x1="715" y1="295" x2="805" y2="295"/><line x1="715" y1="320" x2="805" y2="320"/><line x1="715" y1="345" x2="805" y2="345"/>
    <line x1="815" y1="245" x2="905" y2="245"/><line x1="815" y1="270" x2="905" y2="270"/><line x1="815" y1="295" x2="905" y2="295"/><line x1="815" y1="320" x2="905" y2="320"/><line x1="815" y1="345" x2="905" y2="345"/>
  </g>

  <!-- Sync Network -->
  <rect x="15" y="385" width="890" height="32" rx="16" fill="#444441" stroke="#B4B2A9" stroke-width="1.5"/>
  <text x="460" y="406" text-anchor="middle" font-size="15" fill="#D3D1C7">Sync Network</text>

  <!-- Bottom row: 3 Compute Units (teal) -->
  <g fill="#085041" stroke="#5DCAA5" stroke-width="1.5">
    <rect x="15"  y="435" width="90" height="85" rx="4"/>
    <rect x="115" y="435" width="90" height="85" rx="4"/>
    <rect x="215" y="435" width="90" height="85" rx="4"/>
  </g>
  <g font-size="13" fill="#9FE1CB" text-anchor="middle">
    <text x="60"  y="471">Compute</text><text x="60"  y="488">Unit</text>
    <text x="160" y="471">Compute</text><text x="160" y="488">Unit</text>
    <text x="260" y="471">Compute</text><text x="260" y="488">Unit</text>
  </g>

  <!-- 3 L1 DMA + 3 L2 DMA (amber) -->
  <g fill="#633806" stroke="#EF9F27" stroke-width="1.5">
    <rect x="315" y="435" width="90" height="85" rx="4"/>
    <rect x="415" y="435" width="90" height="85" rx="4"/>
    <rect x="515" y="435" width="90" height="85" rx="4"/>
    <rect x="615" y="435" width="90" height="85" rx="4"/>
    <rect x="715" y="435" width="90" height="85" rx="4"/>
    <rect x="815" y="435" width="90" height="85" rx="4"/>
  </g>
  <g font-size="13" fill="#FAC775" text-anchor="middle">
    <text x="360" y="481">L1 DMA</text>
    <text x="460" y="481">L1 DMA</text>
    <text x="560" y="481">L1 DMA</text>
    <text x="660" y="481">L2 DMA</text>
    <text x="760" y="481">L2 DMA</text>
    <text x="860" y="481">L2 DMA</text>
  </g>

</svg>
