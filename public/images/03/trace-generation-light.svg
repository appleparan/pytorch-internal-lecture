<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: ui-sans-serif, system-ui, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- PyFrameObject outer border - thick -->
<rect x="18" y="16" width="642" height="462" rx="16" fill="none" stroke="#888780" stroke-width="2.5" stroke-dasharray="8 5"/>
<text x="36" y="38" font-size="12" fill="#5F5E5A" font-weight="500">PyFrameObject</text>

<!-- Transformed bytecode container -->
<rect x="210" y="50" width="155" height="316" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="287" y="71" font-size="12" text-anchor="middle" fill="#5F5E5A">Transformed</text>
<text x="287" y="85" font-size="12" text-anchor="middle" fill="#5F5E5A">bytecode</text>

<!-- Arrow: entry into bytecode -->
<line x1="287" y1="94" x2="287" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Guard box -->
<rect x="36" y="130" width="106" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="89" y="153" font-size="14" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A" font-weight="500">Guard</text>
<text x="89" y="171" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">조건 체크</text>

<!-- Pass arrow -->
<text x="181" y="148" font-size="12" text-anchor="middle" fill="#5F5E5A">Pass</text>
<line x1="142" y1="158" x2="220" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Fail arrow + Fallback -->
<line x1="89" y1="186" x2="89" y2="315" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="105" y="255" font-size="12" fill="#5F5E5A">Fail</text>
<text x="89" y="334" font-size="14" text-anchor="middle" fill="#2C2C2A" font-weight="500">Fallback</text>

<!-- FxGraph 계산 (amber) -->
<rect x="220" y="126" width="135" height="64" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="287" y="150" font-size="14" text-anchor="middle" dominant-baseline="central" fill="#412402" font-weight="500">FxGraph 계산</text>
<text x="287" y="170" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#854F0B">핵심 연산 단계</text>

<!-- Arrow: FxGraph → Graph Break -->
<line x1="287" y1="190" x2="287" y2="276" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="297" y="238" font-size="11" fill="#B4B2A9">graph break</text>

<!-- Graph Break (gray) -->
<rect x="220" y="278" width="135" height="64" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="287" y="302" font-size="14" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A" font-weight="500">Graph Break</text>
<text x="287" y="322" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">이후 부분 실행</text>

<!-- Captured FxGraph (teal) -->
<rect x="428" y="50" width="178" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="517" y="82" font-size="14" text-anchor="middle" dominant-baseline="central" fill="#04342C" font-weight="500">Captured FxGraph</text>

<!-- FxGraph back-arrow (teal → bytecode top) -->
<path d="M 428 82 L 392 82 L 392 158 L 355 158" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Select label + arrow -->
<text x="391" y="300" font-size="12" text-anchor="middle" fill="#5F5E5A">Select</text>
<line x1="355" y1="310" x2="428" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Resumed function selected (purple) -->
<rect x="428" y="278" width="178" height="64" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="517" y="302" font-size="14" text-anchor="middle" dominant-baseline="central" fill="#26215C" font-weight="500">Resumed function</text>
<text x="517" y="322" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#3C3489">선택 및 실행</text>

<!-- Resumed function alt (purple, dimmed) -->
<rect x="428" y="370" width="178" height="64" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5" opacity="0.5"/>
<text x="517" y="394" font-size="14" text-anchor="middle" dominant-baseline="central" fill="#26215C" font-weight="500" opacity="0.5">Resumed function</text>
<text x="517" y="414" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#3C3489" opacity="0.5">대안 후보</text>

<!-- Dashed link between two resume boxes -->
<line x1="517" y1="342" x2="517" y2="370" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="3 2"/>

<!-- Repeat loop arrow -->
<path d="M 606 310 L 636 310 L 636 35 L 287 35 L 287 50" fill="none" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="460" y="28" font-size="11" text-anchor="middle" fill="#888780">↻ 새 프레임 생성 후 반복</text>
</svg>
